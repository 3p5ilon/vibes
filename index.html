<!doctype html>
<html>
  <head>
    <title>vibes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>"
    />
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #111210;
      --text: #ddd8d0;
      --link: #3d3d3a;
      --link-hover: #a8a49c;
      --border: rgba(255, 255, 255, 0.07);
      --lb-bg: rgba(10, 10, 9, 0.94);
      --lb-name: #555;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f2f0eb;
        --text: #111;
        --link: #bbb;
        --link-hover: #444;
        --border: rgba(0, 0, 0, 0.09);
        --lb-bg: rgba(235, 233, 228, 0.96);
        --lb-name: #aaa;
      }
    }

    body {
      background: var(--bg);
      min-height: 100vh;
    }

    /* desktop: [2026 vibes  2025  2024] ......... [11 images] */
    #header {
      padding: 1.6rem 2rem 1.4rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    #left {
      display: flex;
      align-items: baseline;
      gap: 1.1rem;
      flex-wrap: wrap;
    }

    h1 {
      font:
        italic normal 20px/1 Georgia,
        serif;
      color: var(--text);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    #nav {
      display: flex;
      gap: 0.8rem;
      align-items: baseline;
      flex-wrap: wrap;
    }

    #nav a {
      font:
        italic normal 14px/1 Georgia,
        serif;
      color: var(--link);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }
    #nav a:hover {
      color: var(--link-hover);
    }

    #count {
      font:
        italic normal 14px/1 Georgia,
        serif;
      color: var(--link);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    /* mobile: */
    @media (max-width: 600px) {
      #header {
        padding: 1rem 1rem 0.8rem;
        flex-direction: column;
        gap: 0.4rem;
      }
      #left {
        flex-direction: column;
        gap: 0.3rem;
      }
      #nav {
        gap: 0.8rem;
      }
      #count {
        font-size: 14px;
      }
      h1 {
        font-size: 18px;
      }
      #nav a {
        font-size: 14px;
      }
    }

    #container {
      position: relative;
      width: 100%;
      min-height: 100vh;
    }

    .w {
      position: absolute;
      cursor: zoom-in;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .w img {
      display: block;
      transition: opacity 0.15s;
    }
    .w:hover img {
      opacity: 0.88;
    }

    .w .n {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.82);
      color: #f0f0f0;
      font: 10px/1.4 monospace;
      padding: 4px 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
    .w:hover .n {
      display: block;
    }

    #lb {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--lb-bg);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lb.open {
      display: flex;
    }
    #lb img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      cursor: zoom-out;
      border-radius: 4px;
    }
    #lb-n {
      color: var(--lb-name);
      font: 11px monospace;
      margin-top: 12px;
      letter-spacing: 0.05em;
    }
  </style>

  <!-- original HTML structure unchanged -->
  <div id="header">
    <div id="left">
      <h1 id="title"></h1>
      <div id="nav"></div>
    </div>
    <div id="count"></div>
  </div>

  <div id="container"></div>

  <div
    id="lb"
    onclick="
      if (event.target === this || event.target.tagName === 'IMG') closeLb();
    "
  >
    <img id="lb-img" src="" alt="" />
    <div id="lb-n"></div>
  </div>

  <script>
    const C = document.getElementById("container");
    const lb = document.getElementById("lb");
    const lbi = document.getElementById("lb-img");
    const lbn = document.getElementById("lb-n");

    let imgs = [],
      idx = 0;
    let allImages = [],
      allYears = [];
    let currentInterval = null;

    const openLb = (i) => {
      idx = i;
      lbi.src = imgs[i].s;
      lbn.textContent = imgs[i].l;
      lb.classList.add("open");
    };
    const closeLb = () => lb.classList.remove("open");

    document.addEventListener("keydown", (e) => {
      if (!lb.classList.contains("open")) return;
      if (e.key === "Escape") closeLb();
      if (e.key === "ArrowRight") {
        idx = (idx + 1) % imgs.length;
        lbi.src = imgs[idx].s;
        lbn.textContent = imgs[idx].l;
      }
      if (e.key === "ArrowLeft") {
        idx = (idx - 1 + imgs.length) % imgs.length;
        lbi.src = imgs[idx].s;
        lbn.textContent = imgs[idx].l;
      }
    });

    let touchX = 0;
    lb.addEventListener(
      "touchstart",
      (e) => {
        touchX = e.touches[0].clientX;
      },
      { passive: true },
    );
    lb.addEventListener(
      "touchend",
      (e) => {
        const diff = touchX - e.changedTouches[0].clientX;
        if (Math.abs(diff) < 50) return;
        if (diff > 0) {
          idx = (idx + 1) % imgs.length;
          lbi.src = imgs[idx].s;
          lbn.textContent = imgs[idx].l;
        } else {
          idx = (idx - 1 + imgs.length) % imgs.length;
          lbi.src = imgs[idx].s;
          lbn.textContent = imgs[idx].l;
        }
      },
      { passive: true },
    );

    function shuffle(a) {
      a = [...a];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getYear() {
      const h = location.hash.slice(1);
      return allYears.includes(h) ? h : allYears[0];
    }

    function renderYear(year) {
      if (currentInterval) clearInterval(currentInterval);
      C.innerHTML = "";
      imgs = [];

      const yearImgs = allImages.filter(([p]) => p.startsWith(year + "/"));

      document.getElementById("title").textContent = year + " vibes";
      document.title = year + " vibes";
      document.getElementById("count").textContent =
        yearImgs.length + " images";
      document.getElementById("nav").innerHTML = allYears
        .filter((y) => y !== year)
        .map((y) =>
          y === allYears[0]
            ? `<a href="./">${y}</a>`
            : `<a href="#${y}">${y}</a>`,
        )
        .join(" ");

      const newUrl =
        year === allYears[0]
          ? location.pathname
          : location.pathname + "#" + year;
      history.replaceState(null, "", newUrl);

      const kv = shuffle(yearImgs);
      const sw = C.getBoundingClientRect().width;

      const pairs = kv.map(([, [w, h]]) => {
        const r = (w * h) / (500 * 300);
        return [
          Math.min(parseInt(r > 16 ? w / 8 : r > 4 ? w / 4 : w / 2), sw - 10),
          parseInt(r > 16 ? h / 8 : r > 4 ? h / 4 : h / 2),
        ];
      });

      let pos = [],
        i = 0;

      currentInterval = setInterval(() => {
        if (i >= kv.length) {
          clearInterval(currentInterval);
          return;
        }

        let H = 600;
        const [w, h] = pairs[i];

        outer: while (true) {
          for (let _ = 0; _ < 50; _++) {
            const al = Math.random() * (sw - w),
              at = Math.random() * (H - h);
            let hit = false;
            for (let j = 0; j < pos.length; j++) {
              const [bl, bt] = pos[j];
              if (
                al < bl + pairs[j][0] &&
                al + w > bl &&
                at < bt + pairs[j][1] &&
                at + h > bt
              ) {
                hit = true;
                break;
              }
            }
            if (!hit) {
              pos.push([parseInt(al), parseInt(at)]);
              break outer;
            }
          }
          H += 50;
        }

        const fp = kv[i][0],
          label = decodeURIComponent(fp.split("/").pop()),
          ii = imgs.length;
        imgs.push({ s: fp, l: label });

        const wrap = document.createElement("div");
        wrap.className = "w";
        wrap.style.cssText = `top:${pos[i][1]}px;left:${pos[i][0]}px;width:${pairs[i][0]}px;height:${pairs[i][1]}px`;
        wrap.onclick = () => openLb(ii);

        const img = document.createElement("img");
        img.src = fp;
        img.loading = "lazy";
        img.style.cssText = `width:${pairs[i][0]}px;height:${pairs[i][1]}px`;

        const n = document.createElement("div");
        n.className = "n";
        n.textContent = label;

        wrap.appendChild(img);
        wrap.appendChild(n);
        C.appendChild(wrap);
        i++;
      }, 100);
    }

    window.addEventListener("hashchange", () => renderYear(getYear()));

    fetch("images.json")
      .then((r) => r.json())
      .then(({ years, images }) => {
        allYears = years;
        allImages = images;
        renderYear(getYear());
      });
  </script>
</html>
